name: Run Telegram TTS Bot

# Kích hoạt thủ công qua nút "Run workflow" trên GitHub
on:
  workflow_dispatch: 

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Lấy mã nguồn
        uses: actions/checkout@v4

      - name: Cài đặt Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cài đặt thư viện
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Chạy Bot Telegram
        # Lấy Token từ GitHub Secrets truyền vào biến môi trường
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python bot.py
